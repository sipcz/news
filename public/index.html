<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>НОВИНИ LIVE — Дрезден</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #d4af37;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border: rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: 0.4s;
            overflow-x: hidden;
        }

        /* Відео-фон */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.35);
        }

        /* Компактний Header */
        header {
            padding: 40px 20px; /* Зменшено у 2 рази */
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        header h1 {
            font-size: 2.2rem; /* Було 3.5 */
            margin: 0;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
        }
        header p { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }

        /* Компактна сітка новин */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); /* Більше карток в рядку */
            gap: 20px;
            padding: 20px 5%; /* Менші відступи по боках */
        }

        .news-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }
        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        .news-card img {
            width: 100%;
            height: 160px; /* Зменшено висоту фото */
            object-fit: cover;
        }
        .news-info { padding: 15px; }
        .news-tag { color: var(--accent); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .news-title { font-size: 1.1rem; margin: 8px 0; line-height: 1.2; font-weight: 500; }
        .news-date { font-size: 0.8rem; color: #888; }

        /* Компактне модальне вікно */
        #newsModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            overflow-y: auto;
            padding: 20px 10px;
        }
        .modal-content { 
            max-width: 600px; /* Було 800px */
            margin: auto; 
            background: #111; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid var(--border);
        }
        .close-btn { float: right; color: var(--accent); font-size: 30px; cursor: pointer; line-height: 1; }

        /* Компактна форма */
        .contact-section {
            background: var(--card-bg);
            margin: 30px 5%;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .contact-section h2 { font-size: 1.5rem; margin-top: 0; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .hp-field { display: none !important; position: absolute; left: -9999px; }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="assets/video/video.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <h1>Новини LIVE</h1>
        <p>Оперативні події у Дрездені</p>
    </header>

    <div class="news-grid" id="newsGrid">
        </div>

    <div id="newsModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeNews()">&times;</span>
            <img id="mImg" style="width:100%; border-radius:12px; margin-bottom:15px; max-height: 300px; object-fit: cover;">
            <h2 id="mTitle" style="color:var(--accent); margin: 0 0 10px 0;"></h2>
            <p id="mDate" style="color:#888; font-size: 0.8rem; margin-bottom: 15px;"></p>
            <div id="mText" style="line-height:1.6; font-size:1rem; white-space: pre-wrap;"></div>
        </div>
    </div>

    <section class="contact-section">
        <h2 style="text-align:center;">Зворотний зв'язок</h2>
        <form id="contactForm">
            <input type="text" name="hp_name" class="hp-field" tabindex="-1" autocomplete="off">
            <input type="text" name="userName" placeholder="Ваше ім'я" required>
            <input type="email" name="userEmail" placeholder="Ваш Email" required>
            <textarea name="message" rows="3" placeholder="Повідомлення..."></textarea>
            
            <div style="margin:10px 0; font-size: 0.85rem; text-align:center;">
                Код: <span id="bot-letters" style="color:var(--accent); font-weight:bold; letter-spacing:2px;"></span>
                <input type="text" name="captcha" placeholder="Код" required style="width:80px; margin-left:10px; padding: 8px;">
            </div>
            
            <button type="submit">Надіслати</button>
            <p id="formStatus" style="text-align:center; margin-top:10px; font-size: 0.9rem;"></p>
        </form>
    </section>

    <script>
        // JS залишається майже таким самим, але з LoadNews для компактності
        async function loadNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Завантаження...</p>";
            try {
                const res = await fetch('/api/news');
                const news = await res.json();
                if (news.length === 0) {
                    grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Новин немає.</p>";
                    return;
                }
                grid.innerHTML = news.map(n => `
                    <div class="news-card" onclick="openNews('${encodeURIComponent(JSON.stringify(n))}')">
                        <img src="${n.img || 'https://via.placeholder.com/400x200?text=News'}" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                        <div class="news-info">
                            <span class="news-tag">${n.category || 'Подія'}</span>
                            <div class="news-title">${n.title}</div>
                            <div class="news-date">${n.date || ''}</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:red;'>Сервер офлайн.</p>"; }
        }

        function openNews(data) {
            const n = JSON.parse(decodeURIComponent(data));
            document.getElementById('mImg').src = n.img || '';
            document.getElementById('mTitle').innerText = n.title;
            document.getElementById('mDate').innerText = n.date || '';
            document.getElementById('mText').innerText = n.content;
            document.getElementById('newsModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeNews() {
            document.getElementById('newsModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        let currentCode = "";
        function generateCaptcha() {
            currentCode = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('bot-letters').innerText = currentCode;
        }

        document.getElementById('contactForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('formStatus');
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            if (data.hp_name || data.captcha.toUpperCase() !== currentCode) {
                status.innerText = "Помилка перевірки!";
                generateCaptcha();
                return;
            }

            status.innerText = "Надсилання...";
            const res = await fetch('/api/taxi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: data.userName, phone: data.userEmail, address: "Сайт", comment: data.message })
            });

            if (res.ok) {
                status.innerText = "Успішно!";
                e.target.reset();
                generateCaptcha();
            }
        };

        generateCaptcha();
        loadNews();

        window.onclick = function(event) {
            if (event.target == document.getElementById('newsModal')) closeNews();
        }
    </script>
</body>
</html>
