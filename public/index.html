<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>НОВИНИ LIVE — Дрезден</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0057b7">
    
    <style>
        :root {
            --p24-green: #4EA524; /* Фірмовий колір як у Привату */
            --ua-blue: #0057b7;
            --ua-yellow: #ffd700;
            --bg-gray: #f5f5f5;
            --card-white: #ffffff;
            --text-main: #1a1a1a;
            --border-color: #e0e0e0;
        }

        body.dark-mode {
            --bg-gray: #0f0f0f; --card-white: #1a1a1a; --text-main: #f5f5f5; --border-color: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-gray); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        /* HEADER В СТИЛІ ДОДАТКУ */
        nav {
            background: var(--card-white);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-bottom: 1px solid var(--border-color);
        }

        .logo { font-size: 1.2rem; font-weight: 800; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
        .logo .live { color: var(--ua-blue); }
        .logo .city { color: var(--text-main); margin-left: 4px; }

        .nav-right { display: flex; gap: 12px; align-items: center; }

        /* КНОПКА ЯК У ДОДАТКУ */
        .btn-action {
            background: var(--p24-green);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* КОНТЕЙНЕР */
        .container { max-width: 1100px; margin: 0 auto; padding: 15px; }
        
        /* СІТКА НОВИН */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }

        /* КАРТКА НОВИНИ */
        .news-card {
            background: var(--card-white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .news-card:active { transform: scale(0.98); }

        .img-box { width: 100%; height: 170px; background: #eee; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.3s; }
        .img-box img.loaded { opacity: 1; }

        .news-info { padding: 15px; }
        .news-info h3 { margin: 0 0 8px 0; font-size: 1rem; line-height: 1.4; }
        .news-meta { font-size: 0.75rem; color: #888; display: flex; justify-content: space-between; }

        /* SKELETON (ЕФЕКТ ЗАВАНТАЖЕННЯ ЯК У ПРИВАТУ) */
        .skeleton { animation: pulse 1.5s infinite ease-in-out; background: #e0e0e0; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* SMART BANNER */
        #smart-banner {
            background: #fff; padding: 10px 15px; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 1px solid #ddd;
            font-size: 0.9rem; font-weight: bold;
        }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; backdrop-filter: blur(5px); }
        .modal-content { 
            background: var(--card-white); width: 100%; max-width: 500px; 
            margin: 0 auto; height: 100%; overflow-y: auto; position: relative;
            padding: 20px; border-radius: 0; 
        }
        @media (min-width: 600px) {
            .modal-content { height: auto; margin: 40px auto; border-radius: 20px; }
        }

        #floating-sos {
            position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px;
            background: #ff3b30; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(255,59,48,0.4); z-index: 100;
        }
    </style>
</head>
<body>

<div id="smart-banner">
    <span>📱 Використовуйте LIVE Дрезден як додаток</span>
    <button class="btn-action" style="background:#000" onclick="alert('Натисніть Поширити -> Додати на початковий екран')">ВСТАНОВИТИ</button>
</div>

<nav>
    <a href="/" class="logo"><span class="live">LIVE</span><span class="city">Дрезден</span></a>
    <div class="nav-right">
        <div id="clock" style="font-size: 0.8rem; font-weight: bold;">00:00</div>
        <button class="btn-action" onclick="toggleModal('contactModal', true)">ПІДТРИМКА</button>
    </div>
</nav>

<div class="container">
    <div style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px;">
        <div class="btn-action" style="background: white; color: black; border: 1px solid #ddd; white-space: nowrap;" id="currency">€ ...</div>
        <div class="btn-action" style="background: white; color: black; border: 1px solid #ddd; white-space: nowrap;" id="shopStatus">Магазини...</div>
    </div>

    <main class="news-grid" id="newsGrid">
        <div class="news-card"><div class="img-box skeleton"></div><div class="news-info"><div class="skeleton" style="height:20px; width:80%;"></div></div></div>
        <div class="news-card"><div class="img-box skeleton"></div><div class="news-info"><div class="skeleton" style="height:20px; width:80%;"></div></div></div>
        <div class="news-card"><div class="img-box skeleton"></div><div class="news-info"><div class="skeleton" style="height:20px; width:80%;"></div></div></div>
    </main>
</div>

<div id="floating-sos" onclick="alert('Швидка: 112, Поліція: 110')">🆘</div>

<div id="newsModal" class="modal" onclick="closeByOutside(event)">
    <div class="modal-content">
        <span onclick="toggleModal('newsModal', false)" style="float:right; cursor:pointer; font-size:1.5rem;">&times;</span>
        <img id="mImg" style="width:100%; border-radius:12px; margin: 15px 0; display:none;">
        <h2 id="mTitle"></h2>
        <p id="mDate" style="color:#888; font-size:0.8rem;"></p>
        <div id="mText" style="white-space: pre-wrap; line-height:1.6;"></div>
    </div>
</div>

<div id="contactModal" class="modal" onclick="closeByOutside(event)">
    <div class="modal-content">
        <span onclick="toggleModal('contactModal', false)" style="float:right; cursor:pointer; font-size:1.5rem;">&times;</span>
        <h3>Зворотний зв'язок</h3>
        <form id="contactForm">
            <input type="text" name="userName" required placeholder="Ваше ім'я" style="width:100%; padding:12px; margin-bottom:10px; border: 1px solid #ddd; border-radius: 10px;">
            <input type="text" name="userContact" required placeholder="Ваш контакт" style="width:100%; padding:12px; margin-bottom:10px; border: 1px solid #ddd; border-radius: 10px;">
            <textarea name="message" rows="5" required placeholder="Чим ми можемо допомогти?" style="width:100%; padding:12px; margin-bottom:10px; border: 1px solid #ddd; border-radius: 10px;"></textarea>
            <button type="submit" class="btn-action" style="width:100%; padding:15px; font-size:1rem;">НАДІСЛАТИ ПОВІДОМЛЕННЯ</button>
        </form>
    </div>
</div>

<script>
    let allNews = [];

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('uk-UA', { timeZone: 'Europe/Berlin', hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000);

    async function loadContent() {
        try {
            const res = await fetch('/api/news');
            allNews = await res.json();
            renderNews(allNews);
        } catch (e) { console.log("Error loading"); }
    }

    function renderNews(news) {
        const grid = document.getElementById('newsGrid');
        grid.innerHTML = news.map((n, i) => `
            <div class="news-card" onclick="openNewsByIndex(${i})">
                <div class="img-box">
                    <img src="${n.img || 'assets/img/auto-news.jpg'}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
                </div>
                <div class="news-info">
                    <div class="news-meta"><span>${n.category}</span><span>${n.date}</span></div>
                    <h3>${n.title}</h3>
                </div>
            </div>
        `).join('');
    }

    function openNewsByIndex(i) {
        const n = allNews[i];
        if(!n) return;
        const img = document.getElementById('mImg');
        img.src = n.img || '';
        img.style.display = n.img ? 'block' : 'none';
        document.getElementById('mTitle').innerText = n.title;
        document.getElementById('mDate').innerText = n.date;
        document.getElementById('mText').innerText = n.content;
        toggleModal('newsModal', true);
    }

    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? 'block' : 'none';
    }

    function closeByOutside(e) { if (e.target.classList.contains('modal')) { toggleModal('newsModal', false); toggleModal('contactModal', false); } }

    async function fetchCurrency() {
        try {
            const res = await fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?valcode=EUR&json');
            const data = await res.json();
            document.getElementById('currency').innerText = `€ ${data[0].rate.toFixed(2)} ₴`;
        } catch (e) {}
    }

    window.onload = () => {
        updateClock(); fetchCurrency(); loadContent();
    };
</script>
</body>
</html>
