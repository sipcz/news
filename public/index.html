<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>НОВИНИ LIVE — Дрезден</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #d4af37;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border: rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Відео-фон */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.3);
        }

        /* Header */
        header {
            padding: 30px 20px;
            text-align: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 {
            font-size: 1.8rem;
            margin: 0;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Кнопка виклику форми */
        .contact-trigger {
            margin-top: 15px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .contact-trigger:hover {
            background: var(--accent);
            color: #000;
        }

        /* Компактна сітка новин */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 30px 5%;
        }

        .news-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }
        .news-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .news-card img { width: 100%; height: 160px; object-fit: cover; }
        .news-info { padding: 15px; }
        .news-title { font-size: 1.1rem; margin: 8px 0; font-weight: 500; line-height: 1.2; }
        .news-date { font-size: 0.8rem; color: #888; }

        /* СПІЛЬНИЙ СТИЛЬ ДЛЯ МОДАЛОК (Новини та Контакти) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px 10px;
        }
        .modal-content { 
            max-width: 500px; /* Компактне окреме поле */
            margin: auto; 
            background: #111; 
            padding: 30px; 
            border-radius: 25px; 
            border: 1px solid var(--border);
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .close-btn { 
            position: absolute;
            right: 20px; top: 15px;
            color: var(--accent); 
            font-size: 30px; 
            cursor: pointer; 
        }

        /* Форма всередині модалки */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 10px;
        }
        .hp-field { display: none !important; }

        .submit-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-top: 10px;
        }

        footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="assets/video/video.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <h1>Новини LIVE</h1>
        <button class="contact-trigger" onclick="openContact()">Написати нам</button>
    </header>

    <div class="news-grid" id="newsGrid">
        </div>

    <div id="newsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeNews()">&times;</span>
            <img id="mImg" style="width:100%; border-radius:12px; margin-bottom:15px; max-height: 250px; object-fit: cover;">
            <h2 id="mTitle" style="color:var(--accent); margin-bottom:10px;"></h2>
            <div id="mText" style="line-height:1.6; font-size:1rem; white-space: pre-wrap;"></div>
        </div>
    </div>

    <div id="contactModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeContact()">&times;</span>
            <h2 style="text-align:center; color:var(--accent); margin-top:0;">Зворотний зв'язок</h2>
            <form id="contactForm">
                <input type="text" name="hp_name" class="hp-field" tabindex="-1">
                <input type="text" name="userName" placeholder="Ваше ім'я" required>
                <input type="email" name="userEmail" placeholder="Email або Телефон" required>
                <textarea name="message" rows="4" placeholder="Повідомлення..." required></textarea>
                
                <div style="margin:10px 0; text-align:center; font-size: 0.9rem;">
                    Код: <span id="bot-letters" style="color:var(--accent); font-weight:bold; letter-spacing:3px;"></span>
                    <input type="text" name="captcha" placeholder="Введіть код" required style="width:100px; margin-left:10px; display:inline-block;">
                </div>
                
                <button type="submit" class="submit-btn">Надіслати</button>
                <p id="formStatus" style="text-align:center; margin-top:10px;"></p>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2026 Новини LIVE — Дрезден. Всі права захищені.
    </footer>

    <script>
        // 1. ЗАВАНТАЖЕННЯ НОВИН
        async function loadNews() {
            const grid = document.getElementById('newsGrid');
            try {
                const res = await fetch('/api/news');
                const news = await res.json();
                grid.innerHTML = news.map(n => `
                    <div class="news-card" onclick="openNews('${encodeURIComponent(JSON.stringify(n))}')">
                        <img src="${n.img || 'https://via.placeholder.com/400x200?text=News'}">
                        <div class="news-info">
                            <div class="news-title">${n.title}</div>
                            <div class="news-date">${n.date || ''}</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { grid.innerHTML = "<p>Помилка завантаження</p>"; }
        }

        // 2. КЕРУВАННЯ МОДАЛКАМИ
        function openNews(data) {
            const n = JSON.parse(decodeURIComponent(data));
            document.getElementById('mImg').src = n.img || '';
            document.getElementById('mTitle').innerText = n.title;
            document.getElementById('mText').innerText = n.content;
            document.getElementById('newsModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeNews() {
            document.getElementById('newsModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function openContact() {
            generateCaptcha();
            document.getElementById('contactModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeContact() {
            document.getElementById('contactModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 3. CAPTCHA & FORM
        let currentCode = "";
        function generateCaptcha() {
            currentCode = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('bot-letters').innerText = currentCode;
        }

        document.getElementById('contactForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('formStatus');
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            if (data.hp_name || data.captcha.toUpperCase() !== currentCode) {
                status.innerText = "Помилка перевірки!";
                generateCaptcha();
                return;
            }

            status.innerText = "Надсилання...";
            const res = await fetch('/api/taxi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: data.userName, phone: data.userEmail, address: "Сайт", comment: data.message })
            });

            if (res.ok) {
                status.innerText = "Успішно надіслано!";
                setTimeout(closeContact, 2000);
            }
        };

        loadNews();

        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                closeNews();
                closeContact();
            }
        }
    </script>
</body>
</html>
