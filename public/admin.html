<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <title>Адмінка — LIVE</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,Arial;margin:0;background:#f3f4f6;padding:20px}
    .wrap{max-width:900px;margin:0 auto}
    .card{background:#fff;padding:16px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.06);margin-bottom:16px}
    input,textarea,select{width:100%;padding:10px;margin-top:8px;border:1px solid #e6e9ee;border-radius:8px;box-sizing:border-box}
    .row{display:flex;gap:10px}
    .btn{background:#111;color:#ffd700;padding:10px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:700}
    .btn.secondary{background:#e9ecef;color:#111}
    label{font-weight:600}
    pre{white-space:pre-wrap;word-break:break-word;background:#0b1220;color:#fff;padding:12px;border-radius:8px;overflow:auto}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loginCard" class="card">
      <h2>Вхід в адмінку</h2>
      <input id="pass" type="password" placeholder="Пароль адміністратора" />
      <div style="margin-top:10px">
        <button class="btn" onclick="doLogin()">Увійти</button>
        <button class="btn secondary" onclick="location.href='/'">На головну</button>
      </div>
      <p style="color:#666;margin-top:8px">Пароль не зберігається на сервері в цій формі — використовується для авторизації запитів.</p>
    </div>

    <div id="adminUI" style="display:none">
      <div class="card">
        <h3>Додати новину</h3>
        <label>Заголовок</label>
        <input id="n_title" />
        <label>Категорія</label>
        <input id="n_category" placeholder="Наприклад: Адмін, Локальні, DW" />
        <label>Контент (короткий)</label>
        <textarea id="n_content" rows="4"></textarea>
        <label>Посилання (опціонально)</label>
        <input id="n_link" />
        <label>Зображення (опціонально) — завантажте файл</label>
        <input id="n_image" type="file" accept="image/*" />
        <div style="margin-top:10px" class="row">
          <button class="btn" onclick="uploadAndAdd()">Завантажити і додати</button>
          <button class="btn secondary" onclick="addWithoutUpload()">Додати без зображення</button>
        </div>
        <div id="addResult" style="margin-top:10px;color:green"></div>
      </div>

      <div class="card">
        <h3>Логи сервера (останні рядки)</h3>
        <div style="margin-bottom:8px">
          <button class="btn" onclick="fetchLogs()">Оновити логи</button>
          <button class="btn secondary" onclick="downloadNews()">Завантажити news-data.json</button>
        </div>
        <pre id="logsPre">Натисніть "Оновити логи"</pre>
      </div>

      <div class="card">
        <h3>Поточні новини (preview)</h3>
        <div id="newsList"></div>
      </div>

      <div style="text-align:right;margin-bottom:40px">
        <button class="btn secondary" onclick="logout()">Вийти</button>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASS_KEY = 'admin_pass_temp'; // тимчасово зберігаємо в сесії для запитів (не безпечно для публічних ПК)
    function doLogin(){
      const pass = document.getElementById('pass').value || '';
      fetch('/api/admin/login', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ pass })
      }).then(r=>r.json().then(j=>({status:r.status, body:j}))).then(res=>{
        if(res.status===200){ sessionStorage.setItem(ADMIN_PASS_KEY, pass); document.getElementById('loginCard').style.display='none'; document.getElementById('adminUI').style.display='block'; loadNews(); fetchLogs(); }
        else if(res.status===403){ alert('Ваш IP заблоковано'); }
        else alert(res.body && res.body.error ? res.body.error : 'Невдала спроба входу');
      }).catch(()=>alert('Помилка з’єднання'));
    }

    function logout(){ sessionStorage.removeItem(ADMIN_PASS_KEY); document.getElementById('adminUI').style.display='none'; document.getElementById('loginCard').style.display='block'; }

    async function uploadAndAdd(){
      const fileInput = document.getElementById('n_image');
      const pass = sessionStorage.getItem(ADMIN_PASS_KEY) || '';
      if(!pass){ alert('Спочатку увійдіть'); return; }
      if(fileInput.files && fileInput.files[0]){
        const fd = new FormData();
        fd.append('image', fileInput.files[0]);
        fd.append('pass', pass);
        const res = await fetch('/api/admin/upload-image', { method:'POST', body: fd });
        const j = await res.json();
        if(res.ok && j.path){
          // додати новину з отриманим шляхом
          await addNews({ img: j.path });
        } else {
          alert(j.error || 'Завантаження не вдалося');
        }
      } else {
        // без файлу — просто додати
        await addNews({});
      }
    }

    async function addWithoutUpload(){ await addNews({}); }

    async function addNews(opts){
      const pass = sessionStorage.getItem(ADMIN_PASS_KEY) || '';
      if(!pass){ alert('Спочатку увійдіть'); return; }
      const payload = {
        pass,
        title: document.getElementById('n_title').value || '',
        category: document.getElementById('n_category').value || '',
        content: document.getElementById('n_content').value || '',
        link: document.getElementById('n_link').value || '',
        img: opts.img || ''
      };
      const res = await fetch('/api/admin/add-news', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      const j = await res.json();
      if(res.ok && j.success){
        document.getElementById('addResult').textContent = 'Новина додана';
        loadNews();
      } else {
        alert(j.error || 'Додавання не вдалося');
      }
    }

    async function fetchLogs(){
      const pass = sessionStorage.getItem(ADMIN_PASS_KEY) || '';
      if(!pass){ alert('Спочатку увійдіть'); return; }
      const res = await fetch('/api/admin/logs?pass=' + encodeURIComponent(pass));
      const j = await res.json();
      if(res.ok && j.success){
        document.getElementById('logsPre').textContent = j.lines.join('\n');
      } else {
        alert(j.error || 'Не вдалося отримати логи');
      }
    }

    async function loadNews(){
      const res = await fetch('/api/news');
      const arr = await res.json();
      const container = document.getElementById('newsList');
      container.innerHTML = '';
      if(!Array.isArray(arr) || arr.length===0){ container.innerHTML = '<div class="placeholder">Новин поки що немає</div>'; return; }
      arr.slice(0,30).forEach(n=>{
        const el = document.createElement('div');
        el.style.borderBottom = '1px solid #eee';
        el.style.padding = '10px 0';
        el.innerHTML = `<strong>${escapeHtml(n.title)}</strong> <span style="color:#666">[${escapeHtml(n.category||'')}]</span><div style="font-size:13px;color:#444">${escapeHtml(n.content||'')}</div><div style="margin-top:6px"><img src="${escapeHtml(n.img||'/assets/img/auto-news.jpg')}" style="max-width:160px;border-radius:6px"></div>`;
        container.appendChild(el);
      });
    }

    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    async function downloadNews(){
      const res = await fetch('/api/news');
      const j = await res.json();
      const blob = new Blob([JSON.stringify(j, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'news-data.json'; a.click();
      URL.revokeObjectURL(url);
    }

    // при завантаженні сторінки — якщо є pass, автоматично показати UI
    (function init(){
      const pass = sessionStorage.getItem(ADMIN_PASS_KEY);
      if(pass){ document.getElementById('loginCard').style.display='none'; document.getElementById('adminUI').style.display='block'; loadNews(); fetchLogs(); }
    })();
  </script>
</body>
</html>
