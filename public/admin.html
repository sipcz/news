<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Панель керування — LIVE</title>
    <style>
        body { margin:0; font-family: sans-serif; background:#f0f2f5; overflow-x:hidden; }
        nav { background:#fff; padding:15px; font-weight:bold; border-bottom:3px solid #ffd700; border-top: 4px solid #0057b7; text-align:center;}
        .card { background:#fff; margin:20px auto; padding:20px; max-width:600px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
        input, textarea, select { width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
        .btn { background:#1a1a1a; color:#ffd700; border:none; padding:12px; width:100%; border-radius:8px; cursor:pointer; font-weight:bold; margin-top: 10px; }
        .btn-del { background:#ff4d4d; color:white; border:none; padding:6px; border-radius:6px; cursor:pointer; width:100%; margin-top:5px; }
        #logConsole { background:#1e1e1e; color:#0f0; padding:15px; border-radius:8px; height:200px; overflow-y:auto; font-family:monospace; font-size:12px; white-space:pre-wrap;}
        .news-item { border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:8px; text-align:center; }
        .news-item img { width:100%; height:120px; object-fit:cover; border-radius:6px; }
        
        /* ЕФЕКТИ */
        #crackCanvas { position:fixed; inset:0; z-index:9999; display:none; pointer-events:none; }
        #hammer { position:fixed; top:50%; left:50%; font-size:80px; z-index:10000; display:none; transform: translate(-50%, -200%); }
        .hammer-hit { display:block!important; animation: hit 0.4s forwards; }
        @keyframes hit { 0%{transform:translate(-50%,-200%) rotate(-45deg);} 100%{transform:translate(-50%,-50%) rotate(0deg);} }
    </style>
</head>
<body>
    <canvas id="crackCanvas"></canvas>
    <div id="hammer">🔨</div>

    <nav>ADMIN PANEL - LIVE ДРЕЗДЕН</nav>

    <div id="loginBox" class="card" style="text-align: center;">
        <h2>Вхід в систему</h2>
        <input type="password" id="adminPass" placeholder="Пароль">
        <button class="btn" onclick="login()">Увійти</button>
    </div>

    <div id="adminPanel" style="display:none;">
        
        <div class="card">
            <h3>Створити публікацію</h3>
            <input type="text" id="newsTitle" placeholder="Заголовок">
            <select id="newsCategory">
                <option value="Дрезден">Дрезден</option>
                <option value="Україна">Україна</option>
            </select>
            <input type="file" id="newsImageInput" accept="image/*">
            <textarea id="newsContent" placeholder="Текст..."></textarea>
            <button class="btn" onclick="addNews()">Опублікувати</button>
        </div>

        <div class="card">
            <h3>Архів новин</h3>
            <div id="adminNewsList" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        </div>

        <div class="card" style="border-left: 5px solid #ff4d4d;">
            <h3>🛡️ Журнал подій</h3>
            <div id="logConsole">Завантаження...</div>
            <button class="btn" style="background:#555; color:#fff;" onclick="fetchLogs()">Оновити логи</button>
        </div>
    </div>

    <script>
        let CURRENT_PASS = "";

        function playHitSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const g = ctx.createGain();
                osc.type='sawtooth'; osc.frequency.setValueAtTime(100, ctx.currentTime);
                g.gain.setValueAtTime(0.5, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.4);
                osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.4);
            } catch(e) {}
        }

        function drawCracks() {
            const c = document.getElementById('crackCanvas'); const ctx = c.getContext('2d');
            c.width=window.innerWidth; c.height=window.innerHeight; c.style.display='block';
            ctx.strokeStyle='white'; ctx.lineWidth=1.5;
            for(let i=0; i<15; i++){
                ctx.beginPath(); ctx.moveTo(c.width/2, c.height/2);
                let x=c.width/2, y=c.height/2;
                for(let j=0; j<10; j++){ x+=(Math.random()-0.5)*300; y+=(Math.random()-0.5)*300; ctx.lineTo(x,y); }
                ctx.stroke();
            }
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0, c.width, c.height);
        }

        async function login() {
            const pass = document.getElementById('adminPass').value;
            try {
                const res = await fetch('/api/admin/login', {
                    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pass})
                });
                const data = await res.json();
                
                if(res.ok) {
                    CURRENT_PASS = pass;
                    document.getElementById('loginBox').style.display='none';
                    document.getElementById('adminPanel').style.display='block';
                    fetchLogs(); renderNews();
                } else if(res.status === 403 || data.showPedro) {
                    document.getElementById('hammer').classList.add('hammer-hit');
                    setTimeout(() => {
                        playHitSound(); drawCracks();
                        document.getElementById('loginBox').innerHTML = `
                            <h1 style="color:#ff3b30">БЛОК!</h1>
                            <img src="https://media.tenor.com/79_u2v0vXRAAAAAM/pedro-raccoon.gif" style="width:100%; border-radius:10px;">
                            <audio src="https://www.myinstants.com/media/sounds/pedro-pedro-pedro-pedro-pe.mp3" autoplay loop></audio>
                        `;
                    }, 400);
                } else { alert(data.error || "Невірний пароль!"); }
            } catch(e) { alert("Сервер недоступний"); }
        }

        async function fetchLogs() {
            try {
                const res = await fetch(`/api/admin/logs?pass=${CURRENT_PASS}`);
                if (res.ok) {
                    const text = await res.text();
                    const el = document.getElementById('logConsole');
                    el.innerText = text; el.scrollTop = el.scrollHeight; // Автоматична прокрутка вниз
                }
            } catch(e) {}
        }

        async function addNews() {
            const title = document.getElementById("newsTitle").value;
            if (!title) return alert("Введіть заголовок!");
            
            const formData = new FormData();
            formData.append("pass", CURRENT_PASS);
            formData.append("title", title);
            formData.append("category", document.getElementById("newsCategory").value);
            formData.append("content", document.getElementById("newsContent").value);
            if(document.getElementById("newsImageInput").files[0]) {
                formData.append("image", document.getElementById("newsImageInput").files[0]);
            }

            try {
                const res = await fetch('/api/news/add', { method: 'POST', body: formData });
                if (res.ok) { 
                    alert("Опубліковано!"); 
                    // ВАЖЛИВО: Очищаємо форму замість перезавантаження сторінки
                    document.getElementById("newsTitle").value = "";
                    document.getElementById("newsContent").value = "";
                    document.getElementById("newsImageInput").value = "";
                    renderNews(); 
                    fetchLogs();
                }
                else alert("Помилка публікації");
            } catch (err) { alert("Помилка з'єднання"); }
        }

        async function renderNews() {
            const res = await fetch('/api/news');
            const news = await res.json();
            document.getElementById("adminNewsList").innerHTML = news.map(n => `
                <div class="news-item">
                    <img src="${n.img || ''}" onerror="this.src='assets/img/auto-news.jpg'">
                    <h4 style="font-size:12px; margin:5px 0;">${n.title}</h4>
                    <button class="btn-del" onclick="deleteNews('${n.id}')">Видалити</button>
                </div>
            `).join('');
        }

        async function deleteNews(id) {
            if (!confirm("Видалити новину?")) return;
            try {
                const res = await fetch('/api/news/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ pass: CURRENT_PASS, id: id })
                });
                if (res.ok) { renderNews(); fetchLogs(); }
                else alert("Помилка при видаленні");
            } catch (e) { alert("Помилка з'єднання"); }
        }
    </script>
</body>
</html>
